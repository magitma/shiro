<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
<title>シロたんエサアプリ</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#142033;--muted:#6b778c;--accent:#2f6fed;--line:#dbe3f0}
*{box-sizing:border-box}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Hiragino Sans','Yu Gothic',sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:430px;margin:0 auto;min-height:100vh;padding:20px 16px 28px}
.header{padding:12px 4px 18px}
h1{font-size:24px;line-height:1.2;margin:0 0 8px}
.subtitle{font-size:14px;color:var(--muted);margin:0}
.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 6px 24px rgba(20,32,51,.06)}
.label{display:block;font-size:14px;font-weight:700;margin:0 0 8px}
input{width:100%;font-size:18px;padding:16px 14px;border:1px solid var(--line);border-radius:14px;outline:none;background:#fff}
input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(47,111,237,.12)}
button{width:100%;margin-top:14px;border:none;border-radius:14px;padding:16px 14px;font-size:17px;font-weight:700;background:var(--accent);color:#fff}
.result{margin-top:16px;background:#f8fbff;border:1px solid #d7e4ff;border-radius:16px;padding:16px}
.big{font-size:28px;font-weight:800;margin:0 0 8px;color:var(--accent)}
.grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-top:12px}
.meal{background:#fff;border:1px solid var(--line);border-radius:14px;padding:12px;text-align:center}
.meal .name{font-size:13px;color:var(--muted);margin-bottom:6px}
.meal .amt{font-size:20px;font-weight:800}
.note{font-size:13px;color:var(--muted);margin-top:12px;line-height:1.5}
.spec{font-size:13px;line-height:1.55;color:#334}
.spec b{color:#111}
.error{color:#b00020;font-weight:700}
</style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>シロたんエサアプリ</h1>
      <p class="subtitle">体重を入力してください。朝・夕方・夜のエサ量を表示します。</p>
    </div>

    <div class="card">
      <label class="label" for="weight">体重（kg）</label>
      <input id="weight" type="number" inputmode="decimal" step="0.1" min="0" placeholder="例 3.2">
      <button id="calcBtn">計算する</button>

      <div class="result" id="result">
        <p class="big">— g</p>
        <div class="grid">
          <div class="meal"><div class="name">朝</div><div class="amt">— g</div></div>
          <div class="meal"><div class="name">夕方</div><div class="amt">— g</div></div>
          <div class="meal"><div class="name">夜</div><div class="amt">— g</div></div>
        </div>
        <div class="note">体重4kg以上は1日40g固定。配分は 3:3:2 です。</div>
      </div>

    </div>
  </div>
<script>
function calc(){
  const w = parseFloat(document.getElementById('weight').value);
  const result = document.getElementById('result');
  if (isNaN(w) || w <= 0) {
    result.innerHTML = '<p class="error">体重を正しく入力してください。</p>';
    return;
  }
  const total = (w >= 4) ? 40 : w * 40;
  const morning = total * 3 / 8;
  const evening = total * 3 / 8;
  const night = total * 2 / 8;
  result.innerHTML = `
    <p class="big">${total.toFixed(1)} g / 日</p>
    <div class="grid">
      <div class="meal"><div class="name">朝</div><div class="amt">${morning.toFixed(1)} g</div></div>
      <div class="meal"><div class="name">夕方</div><div class="amt">${evening.toFixed(1)} g</div></div>
      <div class="meal"><div class="name">夜</div><div class="amt">${night.toFixed(1)} g</div></div>
    </div>
    <div class="note">体重${w.toFixed(1)}kg に対する計算結果です。</div>
  `;
}
document.getElementById('calcBtn').addEventListener('click', calc);
document.getElementById('weight').addEventListener('keydown', e => { if (e.key === 'Enter') calc(); });
</script>
</body>
</html>
